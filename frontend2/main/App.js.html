<script>
const App = (function() {
    // =========================================================================
    // PRIVATE STATE
    // =========================================================================
    let _userContext = null;
    let _activeTeam = null;
    let _weekOffset = 0; // 0 = this week & next, 1 = week+2 & week+3, etc.
    let _scheduleDataCache = []; // Cache to hold all 4 weeks of data
    let _pollIntervalId = null; // This will hold the ID of our timer
    let _lastServerTimestamp = 0; // Tracks the timestamp of the last known server data
    const POLL_INTERVAL_MS = 30000; // 30 seconds

    // =========================================================================
    // PRIVATE METHODS (Data Fetching & Handling)
    // =========================================================================

    /**
     * Fetches all the necessary data from the backend when the app starts.
     */
    function _fetchInitialData() {
        console.log("App: Fetching initial data from server...");
        google.script.run
            .withSuccessHandler(_onInitialDataSuccess)
            .withFailureHandler(_onDataFetchFailure)
            .getUserContext();
    }

    /**
     * THIS IS THE CORRECTED FUNCTION.
     * It now handles all UI updates and renders the grid immediately from the
     * data it receives, without making a second server call.
     */
// The final, correct version of this function
function _onInitialDataSuccess(context) {
    console.log("App: Processing pre-loaded data package.", context);
    if (!context || !context.isAuthenticated) {
        console.error("App: User is not authenticated or context is invalid.");
        return;
    }

    // 1. Store context and team data from the initial package
    _userContext = context;
    _activeTeam = context.teams && context.teams.length > 0 ? context.teams[0] : null;

    // 2. CRITICAL: Save the full 4-week schedule into our client-side cache
    if (context.schedule && context.schedule.weeks && context.schedule.weeks.length > 0) {
        _scheduleDataCache = context.schedule.weeks;
        console.log(`App: Stored ${_scheduleDataCache.length} weeks of schedule data in cache.`);
    } else {
        console.error("App: CRITICAL - Initial schedule data is missing from the data package!");
    }
    _lastServerTimestamp = context.schedule.serverTimestamp || new Date().getTime();

    // 3. Update all relevant UI components with the initial data
    if (_userContext) {
        UserProfile.update(_userContext);
    }
    if (_activeTeam) {
        TeamInfo.update(_activeTeam, _userContext);
    }
    // You can add other component updates here, e.g. FavoritesList.render(context.favorites);

    // 4. Perform the initial render of the grids and navigation using the cache
    _renderVisibleGridsFromCache();
}

    function _renderWeeksFromCache() {
        if (!_scheduleDataCache || _scheduleDataCache.length === 0) {
            console.error("Cannot render from cache: No schedule data available.");
            return;
        }
        
        // Offset 0 shows weeks at index 0 & 1. Offset 1 shows weeks at index 2 & 3.
        const week1Index = _weekOffset * 2;
        const week2Index = week1Index + 1;

        const week1Data = _scheduleDataCache[week1Index];
        const week2Data = _scheduleDataCache[week2Index];

        // Render the grids
        if (week1Data) AvailabilityGrid.render('availability-grid-week1', week1Data);
        if (week2Data) AvailabilityGrid.render('availability-grid-week2', week2Data);

        // Update navigation display
        WeekNavigation.updateDisplay({
            week1Text: week1Data ? `Week ${week1Data.weekNumber} (${week1Data.year})` : 'N/A',
            week2Text: week2Data ? `Week ${week2Data.weekNumber} (${week2Data.year})` : 'N/A',
            canGoPrev: _weekOffset > 0,
            canGoNext: _weekOffset < 1 // Only allow one "next" click since we have 4 weeks total
        });

        setTimeout(_updatePanelHeights, 100);
    }

    /**
 * NEW: Pings the server periodically to check for any changes to the active team.
 */
function _pollForServerChanges() {
    if (!_activeTeam || !_activeTeam.teamId) {
        // Don't poll if there's no active team selected
        return;
    }

    console.log(`App: Polling for updates for team ${_activeTeam.teamId}...`);
    google.script.run
        .withSuccessHandler(_handlePollResponse)
        .withFailureHandler(_onDataFetchFailure) // We can reuse the generic failure handler
        .checkForScheduleUpdates(_activeTeam.teamId, _lastServerTimestamp);
}


    /**
     * Fetches schedule data for the currently selected weeks from the backend.
     * THIS FUNCTION IS STILL NEEDED for the Prev/Next buttons.
     */
    function _fetchScheduleForWeeks() {
        if (!_activeTeam) return;

        console.log(`App: Fetching schedule for week offset: ${_weekOffset}`);
        const weeksToFetch = _calculateWeeksToDisplay();
        const week1 = weeksToFetch[0];
        const week2 = weeksToFetch[1];

        // This backend function gets data for two weeks at once.
        google.script.run
            .withSuccessHandler(_onScheduleUpdateSuccess)
            .withFailureHandler(_onDataFetchFailure)
            .getTeamSchedulesForDisplay(_activeTeam.teamId, week1.year, week1.week, week2.year, week2.week);
    }

    /**
     * Success handler for when new schedule data is received from the backend.
     */
    function _onScheduleUpdateSuccess(response) {
        console.log("App: Received new schedule data.", response);
        if (!response.success) {
            _onDataFetchFailure(response.message);
            return;
        }
        
        if (response.weeks && response.weeks.length > 0) {
            const week1Data = response.weeks[0];
            const week2Data = response.weeks.length > 1 ? response.weeks[1] : null;

            // Render the new data in the availability grids
            if (week1Data) AvailabilityGrid.render('availability-grid-week1', week1Data);
            if (week2Data) AvailabilityGrid.render('availability-grid-week2', week2Data);

            // Update the navigation component with new text and button states
            WeekNavigation.updateDisplay({
                week1Text: `Week ${week1Data.weekNumber} (${week1Data.year})`,
                week2Text: week2Data ? `Week ${week2Data.weekNumber} (${week2Data.year})` : 'End of Schedule',
                canGoPrev: _weekOffset > 0,
                canGoNext: true // For now, we assume we can always go forward
            });

            // Adjust the layout to fit the newly rendered grids
            setTimeout(_updatePanelHeights, 100); // Small delay for browser rendering
        }
    }

    /**
     * This function runs if any backend call fails.
     */
    function _onDataFetchFailure(error) {
        console.error("App: Failed to fetch data from server.", error);
        // Ideally, show a user-friendly error message in the UI.
    }


    // =========================================================================
    // PRIVATE METHODS (Utilities)
    // =========================================================================

    /**
     * It measures the main grids and adjusts side panel heights to match.
     */
    function _updatePanelHeights() {
        console.log("App: Updating panel heights...");
        const week1Grid = document.getElementById('availability-grid-week1');
        const week2Grid = document.getElementById('availability-grid-week2');
        if (!week1Grid || !week2Grid) return;

        const week1Container = week1Grid.parentElement;
        const week2Container = week2Grid.parentElement;
        if (!week1Container || !week2Container) return;
        
        const week1Height = week1Container.getBoundingClientRect().height;
        const week2Height = week2Container.getBoundingClientRect().height;
        
        const favoritesPanel = document.getElementById('grid-cell-middle-right');
        const browseTeamsPanel = document.getElementById('grid-cell-bottom-right');
        
        if (favoritesPanel) {
            const listContainer = favoritesPanel.querySelector('#favorites-list-container');
            if (listContainer) listContainer.style.height = `${week1Height - 40}px`; // 40px is approx height of panel header
        }
        
        if (browseTeamsPanel) {
            const listContainer = browseTeamsPanel.querySelector('#browse-teams-list-container');
            if(listContainer) listContainer.style.height = `${week2Height - 80}px`; // 80px is approx height of header + filter
        }
        console.log("App: Panel heights adjusted.");
    }

    /**
     * Calculates the two weeks to display based on the current offset.
     * @returns {Array<Object>} An array of two week objects, e.g., [{year: 2025, week: 24}, ...]
     */
    function _calculateWeeksToDisplay() {
        const weeks = [];
        const today = new Date();
        const WEEKS_TO_SHOW = 2;
        for (let i = 0; i < WEEKS_TO_SHOW; i++) {
            const date = new Date(today);
            date.setDate(date.getDate() + ((_weekOffset * WEEKS_TO_SHOW) + i) * 7);
            
            // Re-using the ISO week number logic from your backend for consistency
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
            weeks.push({ year: d.getUTCFullYear(), week: weekNo });
        }
        return weeks;
    }

    /**
 * NEW: Handles the response from the polling check. Routes updates to the correct components.
 */
function _handlePollResponse(response) {
    if (response && response.success && response.hasChanges) {
        console.log("App: Changes detected from server!", response);

        // Always update our timestamp to prevent repeated notifications for the same change
        _lastServerTimestamp = response.serverTimestamp;

        // Route the update based on the type of change
        switch (response.changeType) {
            case 'availability':
                // For availability changes, we need to get the full new schedule data
                // and update our cache, then re-render the grids.
                // NOTE: This part requires the backend to send back the updated schedule data.
                // Assuming the response contains a full 'schedule' object for simplicity.
                if (response.schedule && response.schedule.weeks) {
                    _scheduleDataCache = response.schedule.weeks;
                    _renderVisibleGridsFromCache();
                    console.log("App: Availability grid updated from polling.");
                }
                break;

            case 'roster':
                // A player has joined or left. We need to update the team info panel.
                // We'll need to fetch the new full team context.
                // For now, let's just log it. A full implementation would refetch team data.
                console.log("App: Roster change detected. Refresh needed.");
                // A simple page reload is a reliable way to handle major changes for now.
                // window.location.reload(); 
                break;
                
            case 'team_settings':
                console.log("App: Team settings change detected. Refresh needed.");
                // window.location.reload();
                break;
                
            default:
                console.log(`App: Unhandled change type: ${response.changeType}`);
                break;
        }
    } else {
        // No changes, do nothing.
        // console.log("App: No changes detected.");
    }
}


    // =========================================================================
    // PUBLIC API
    // =========================================================================

    /**
     * Initializes all services and components. This is the main entry point of the app.
     */
// PROPOSED REPLACEMENT FUNCTION for frontend2/main/App.js.html

// PROPOSED REPLACEMENT FUNCTION for frontend2/main/App.js.html

function init(initialData) {
    console.log("App: Initializing with pre-loaded data...");

    // --- Initialize Services FIRST (Now included) ---
    GridSelectionService.init();
    TemplateService.init();

    // --- Initialize All UI Components ---
    // These just set up the elements and listeners.
    UserProfile.init('grid-cell-top-left');
    WeekNavigation.init('grid-cell-top-center');
    MatchFilters.init('grid-cell-top-right');
    TeamInfo.init('grid-cell-middle-left');
    GridTools.init('grid-cell-bottom-left');
    BrowseTeams.init('grid-cell-bottom-right');
    FavoritesList.init('grid-cell-middle-right');
    AvailabilityGrid.init('availability-grid-week1'); // Initialize for both grid instances
    AvailabilityGrid.init('availability-grid-week2');
    
    // --- Use the pre-loaded data to populate the UI ---
    if (initialData && initialData.isAuthenticated) {
        _onInitialDataSuccess(initialData); // Reuse your existing success handler
    } else {
        console.error("App: User is not authenticated or no initial data was provided.");
        // Here you would typically show a login screen or an error message.
    }
    _pollIntervalId = setInterval(_pollForServerChanges, POLL_INTERVAL_MS);
}
    
    /**
     * Public function for components to request a week change.
     * @param {string} direction - 'prev' or 'next'.
     */
function requestWeekChange(direction) {
    // 1. Update the offset (state)
    if (direction === 'next' && _weekOffset === 0) {
        _weekOffset = 1; // Move to showing weeks 3 & 4
    } else if (direction === 'prev' && _weekOffset === 1) {
        _weekOffset = 0; // Move back to showing weeks 1 & 2
    }

    // 2. Re-render the grids and nav buttons USING THE CACHE
    _renderVisibleGridsFromCache(); 
}

function _renderVisibleGridsFromCache() {
    // 3. Determine which weeks to show from the cache
    const week1Data = _scheduleDataCache[_weekOffset * 2];     // e.g., index 0 or 2
    const week2Data = _scheduleDataCache[_weekOffset * 2 + 1]; // e.g., index 1 or 3

    // 4. Tell the components to update themselves with the cached data
    AvailabilityGrid.render('availability-grid-week1', week1Data);
    AvailabilityGrid.render('availability-grid-week2', week2Data);
    WeekNavigation.updateDisplay({ /* new week text and button states */ });
}
    
    /**
     * Public function for components to get the currently active team data.
     */
    function getActiveTeam() {
        return _activeTeam;
    }

    // This "reveals" our public functions so they can be called from outside.
    return {
        init: init,
        requestWeekChange: requestWeekChange,
        getActiveTeam: getActiveTeam
    };

})();
</script>
