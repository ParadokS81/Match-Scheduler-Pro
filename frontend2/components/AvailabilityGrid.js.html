<script>
/**
 * Availability Grid Component
 * Renders and handles interactions with the main availability grid.
 */
const AvailabilityGrid = (function() {
    // _gridInstances will store a reference to the DOM element for each grid
    let _gridInstances = {};

    /**
     * Handles clicks within the grid using event delegation.
     */
    function _onGridClick(event) {
        const cell = event.target.closest('.availability-cell');
        if (!cell) return;
        
        const gridId = event.currentTarget.id;
        // Get row and column index from the data attributes we'll add during render
        const rowIndex = parseInt(cell.parentElement.dataset.rowIndex, 10);
        const colIndex = parseInt(cell.dataset.colIndex, 10);

        if (isNaN(rowIndex) || isNaN(colIndex)) return;

        console.log(`Cell clicked: Grid=${gridId}, Row=${rowIndex}, Col=${colIndex}`);
        
        // In the future, this will call the selection service to manage state
        // For example: GridSelectionService.toggleSelection(gridId, rowIndex, colIndex);
    }

    /**
     * Renders the entire grid, including headers and body, from schedule data.
     * @param {string} gridId - The ID of the table element to render into (e.g., 'availability-grid-week1').
     * @param {Object} scheduleDataForWeek - The data object for a single week from the backend.
     */
    function render(gridId, scheduleDataForWeek) {
        const gridElement = _gridInstances[gridId];
        if (!gridElement) {
            console.error(`AvailabilityGrid.render: Grid element #${gridId} not found in instances.`);
            return;
        }

        if (!scheduleDataForWeek || scheduleDataForWeek.error) {
            gridElement.innerHTML = '<thead><tr><th class="p-4 text-red-400">Error loading data for this week.</th></tr></thead>';
            return;
        }

        // ---- Generate Header (thead) ----
        let headerHtml = '<thead><tr>';
        headerHtml += '<th class="time-label p-1 w-16 sm:w-20 text-xs font-medium text-slate-400 text-center sticky left-0 bg-slate-800 z-10">Time</th>';
        
        const dayHeaders = scheduleDataForWeek.dayHeaders || ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        dayHeaders.forEach((header, index) => {
             const isWeekend = index >= 5;
             const headerTextColor = isWeekend ? 'text-amber-400' : 'text-sky-400';
             headerHtml += `<th class="day-header-full p-1 text-xs font-medium ${headerTextColor} text-center bg-slate-700/50 rounded-t-sm">${header}</th>`;
        });
        headerHtml += '</tr></thead>';

        // ---- Generate Body (tbody) ----
        let bodyHtml = `<tbody id="availability-grid-body-${gridId}">`;
        const timeSlots = scheduleDataForWeek.timeSlots || [];
        
        timeSlots.forEach((time, timeIndex) => {
            bodyHtml += `<tr data-row-index="${timeIndex}">`;
            bodyHtml += `<td class="time-label p-1 text-xs text-slate-400 text-center font-mono whitespace-nowrap sticky left-0 bg-slate-800 z-10 rounded-l-sm">${time}</td>`;

            const dayDataArray = (scheduleDataForWeek.availability && scheduleDataForWeek.availability[timeIndex]) ? scheduleDataForWeek.availability[timeIndex].days : [];

            for (let dayIndex = 0; dayIndex < 7; dayIndex++) {
                const dayData = dayDataArray[dayIndex] || { initials: [] };
                const isWeekend = dayIndex >= 5;
                const cellBg = isWeekend ? 'bg-slate-700/30 hover:bg-slate-600/50' : 'bg-slate-700/10 hover:bg-slate-700/30';
                const cellText = dayData.initials.join(', ');
                
                bodyHtml += `<td class="availability-cell ${cellBg} cursor-pointer rounded-sm h-9 sm:h-10 border border-slate-700/50 align-middle" data-col-index="${dayIndex}"><div class="leading-tight">${cellText}</div></td>`;
            }
            bodyHtml += '</tr>';
        });

        bodyHtml += '</tbody>';

        // Set the complete HTML for the grid table
        gridElement.innerHTML = headerHtml + bodyHtml;
    }

    /**
     * Initializes the component by finding the grid element and attaching event listeners.
     */
    function init(gridId) {
        const gridElement = document.getElementById(gridId);
        if (!gridElement) {
            console.error(`AvailabilityGrid.init: Grid element #${gridId} not found!`);
            return;
        }
        
        _gridInstances[gridId] = gridElement;
        gridElement.addEventListener('click', _onGridClick);
        console.log(`AvailabilityGrid Initialized for #${gridId}.`);
    }

    return { init, render };
})();
</script>
